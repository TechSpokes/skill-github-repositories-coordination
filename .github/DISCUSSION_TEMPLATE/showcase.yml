title: "Coordination pattern showcase"
labels: ["showcase", "community"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Repository-centered outcome
    validations:
      required: true
  - type: textarea
    id: work
    attributes:
      label: Work types and scale
  - type: textarea
    id: pattern
    attributes:
      label: Pattern or tool choice
      description: Explain the current system, chosen change, and why it fits.
    validations:
      required: true
  - type: textarea
    id: lessons
    attributes:
      label: Results, tradeoffs, and lessons
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private repository, account, organization, client, and credential details.
          required: true
