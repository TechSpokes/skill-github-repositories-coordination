title: "General discussion"
labels: ["discussion"]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Repository access
        - Inventory and portfolio review
        - Cross-repository coordination
        - Tool fit and adoption
        - Non-code and mixed work
        - Agent portability
        - Maintenance and releases
        - Other
    validations:
      required: true
  - type: textarea
    id: discussion
    attributes:
      label: Discussion
      description: Share the outcome and sanitized context.
    validations:
      required: true
