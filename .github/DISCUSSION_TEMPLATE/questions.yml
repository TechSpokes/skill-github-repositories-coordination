title: "Questions and help"
labels: ["question"]
body:
  - type: dropdown
    id: question-type
    attributes:
      label: Question type
      options:
        - Getting started
        - Installing or updating
        - Activating the skill
        - Diagnosing GitHub access
        - Choosing an inventory or coordination pattern
        - Using the skill for non-code work
        - Contributing
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Sanitized context
      description: State the work type, scale, current system, and available agent capabilities.
