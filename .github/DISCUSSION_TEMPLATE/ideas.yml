title: "Ideas and improvements"
labels: ["enhancement", "discussion"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Observed problem
      description: Which repository coordination case needs improvement?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or example
      description: Use public or sanitized evidence.
  - type: textarea
    id: idea
    attributes:
      label: Smallest useful change
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Adaptation, safety, and maintenance tradeoffs
