name: Question
description: Ask about installation, activation, adaptation, or repository coordination
labels: [question]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation or update
        - Agent access to repositories
        - Inventory or portfolio review
        - Cross-repository coordination
        - Tool comparison
        - Non-code or mixed work
        - Safety or permissions
        - Contributing or releasing
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Requested outcome
      description: What repository-centered decision are you trying to make?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Sanitized context
      description: Include relevant work types, scale, current system, and agent capabilities without private details.
