name: Bug report
description: Report incorrect activation, behavior, guidance, validation, or packaging
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Remove private repository names, account details, local paths, and credentials before submitting.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Activation or handoff
        - Context calibration
        - Repository classification
        - Access or agent capabilities
        - Inventory or coordination
        - Tool recommendation
        - Safety or permissions
        - Installation
        - Validation or packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What did the agent or repository tooling do?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Which outcome or invariant should have held?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide a sanitized prompt, capability context, and steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Skill version:
        - Agent host and version:
        - Installation scope:
        - Available capabilities:
  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      render: text
