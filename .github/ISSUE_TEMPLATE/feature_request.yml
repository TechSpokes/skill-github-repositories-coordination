name: Improvement proposal
description: Propose a skill or maintenance improvement supported by evidence
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Observed problem
      description: What repository coordination case is not handled well?
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Work and user context
      description: Which work types, scale, collaboration, and agent capabilities are affected?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Provide sanitized examples or primary sources.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain the smallest change and its activation or workflow boundary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current system, no change, and alternatives
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary review
      options:
        - label: The proposal does not require a code-only taxonomy.
        - label: The proposal preserves conversation-only usefulness.
        - label: The proposal states permission, privacy, maintenance, and reversibility impacts.
        - label: The proposal identifies affected activation, behavior, or adversarial evaluation cases.
        - label: The proposal states teaching, governance, and release impacts.
