name: Release Abandonment

on:
  push:
    tags:
      - "abandoned/v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Exact unpublished version tag to prohibit permanently
        required: true
        type: string
      reason:
        description: Why this candidate must not be published
        required: true
        type: string
      evidence:
        description: Optional failed workflow or evidence URL
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-abandonment
  cancel-in-progress: false

jobs:
  abandon:
    name: Permanently abandon version
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: identity
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ ! "${REF_NAME}" =~ ^abandoned/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Unexpected abandonment marker ${REF_NAME}." >&2
              exit 1
            fi
            tag="${REF_NAME#abandoned/}"
          else
            if [[ ! "${INPUT_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "Unexpected release tag ${INPUT_TAG}." >&2
              exit 1
            fi
            tag="${INPUT_TAG}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check out current release automation
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Inspect immutable release state
        id: state
        run: npm run release:state -- inspect --tag "${{ steps.identity.outputs.tag }}" --github-output "${GITHUB_OUTPUT}"

      - name: Require an unpublished draft or an idempotent marker
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MARKER_STATE: ${{ steps.state.outputs.marker_state }}
          RELEASE_TAG: ${{ steps.state.outputs.tag }}
        run: |
          set -euo pipefail
          if ! release_json="$(gh release view "${RELEASE_TAG}" --json isDraft,url 2>/dev/null)"; then
            if [[ "${MARKER_STATE}" != "matching" ]]; then
              echo "${RELEASE_TAG} has no draft and no matching abandonment marker." >&2
              exit 1
            fi
            echo "present=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
            echo "${RELEASE_TAG} is published; refusing abandonment mutation." >&2
            exit 1
          fi
          echo "present=true" >> "${GITHUB_OUTPUT}"

      - name: Create immutable abandonment marker
        if: github.event_name == 'workflow_dispatch' && steps.state.outputs.marker_state == 'absent'
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          EVIDENCE: ${{ inputs.evidence }}
          MARKER: ${{ steps.state.outputs.marker }}
          REASON: ${{ inputs.reason }}
          RELEASE_COMMIT: ${{ steps.state.outputs.release_commit }}
          RELEASE_TAG: ${{ steps.state.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "${REASON}" =~ [^[:space:]] ]]; then
            echo "An abandonment reason is required." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          message_file="${RUNNER_TEMP}/abandonment-marker.txt"
          {
            echo "Abandon ${RELEASE_TAG}: ${REASON}"
            echo
            echo "Actor: ${ACTOR}"
            echo "Release tag: ${RELEASE_TAG}"
            echo "Marker tag: ${MARKER}"
            echo "Commit: ${RELEASE_COMMIT}"
            if [[ -n "${EVIDENCE}" ]]; then echo "Evidence: ${EVIDENCE}"; fi
          } > "${message_file}"
          git tag -a "${MARKER}" "${RELEASE_COMMIT}" -F "${message_file}"
          git push origin "refs/tags/${MARKER}"

      - name: Verify immutable remote marker
        id: verified
        run: npm run release:state -- inspect --tag "${{ steps.identity.outputs.tag }}" --github-output "${GITHUB_OUTPUT}"

      - name: Delete only the unpublished draft
        if: steps.release.outputs.present == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.state.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.verified.outputs.marker_state }}" != "matching" ]]; then
            echo "The remote abandonment marker is not verified." >&2
            exit 1
          fi
          if [[ "$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft')" != "true" ]]; then
            echo "${RELEASE_TAG} is no longer an unpublished draft; refusing deletion." >&2
            exit 1
          fi
          gh release delete "${RELEASE_TAG}" --yes

      - name: Record abandonment evidence
        shell: bash
        env:
          MARKER: ${{ steps.verified.outputs.marker }}
          RELEASE_COMMIT: ${{ steps.verified.outputs.release_commit }}
          RELEASE_TAG: ${{ steps.verified.outputs.tag }}
        run: |
          {
            echo "## Release abandonment"
            echo
            echo "- Version: ${RELEASE_TAG}"
            echo "- Marker: ${MARKER}"
            echo "- Commit: ${RELEASE_COMMIT}"
            echo "- Result: permanently prohibited from publication"
          } >> "${GITHUB_STEP_SUMMARY}"
