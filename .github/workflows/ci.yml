name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pull-request-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate skill
        run: npm run validate

      - name: Validate GitHub CLI skill source
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run

      - name: Package smoke test
        run: npm run package -- v0.0.0

      - name: Verify packaged assets
        run: npm run release:verify-assets -- v0.0.0
